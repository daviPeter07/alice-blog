services:
  postgres:
    image: postgres:16-alpine
    container_name: alice_blog_db
    environment:
      POSTGRES_USER: alice
      POSTGRES_PASSWORD: alice
      POSTGRES_DB: alice_blog_dev
    ports:
      - "5432:5432"
    volumes:
      - alice_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alice -d alice_blog_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  alice_postgres_data:
